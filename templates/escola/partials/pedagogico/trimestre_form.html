{% load static %}
<form id="formGestao" method="post">
    {% csrf_token %}
    <input type="hidden" name="categoria" value="trimestre">
    
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="metal-form-label">Ano Lectivo <span class="text-danger">*</span></label>
            <select name="ano_lectivo" class="metal-form-select" required>
                <option value="">Selecione...</option>
                {% for ano in form.fields.ano_lectivo.queryset %}
                <option value="{{ ano.id }}" {% if form.ano_lectivo.value == ano.id %}selected{% endif %}>
                    {{ ano.ano }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-6 mb-3">
            <label class="metal-form-label">Número <span class="text-danger">*</span></label>
            <select name="numero" class="metal-form-select" required>
                <option value="">Selecione...</option>
                <option value="1" {% if form.numero.value == 1 %}selected{% endif %}>1º Trimestre</option>
                <option value="2" {% if form.numero.value == 2 %}selected{% endif %}>2º Trimestre</option>
                <option value="3" {% if form.numero.value == 3 %}selected{% endif %}>3º Trimestre</option>
            </select>
        </div>
    </div>
    
    <div class="mb-3">
        <label class="metal-form-label">Nome <span class="text-danger">*</span></label>
        <input type="text" name="nome" class="metal-form-control" placeholder="Ex: 1º Trimestre" 
               value="{{ form.nome.value|default:'' }}" required>
    </div>
    
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="metal-form-label">Data de Início <span class="text-danger">*</span></label>
            <input type="date" name="data_inicio" class="metal-form-control" 
                   value="{{ form.data_inicio.value|default:''|date:'Y-m-d' }}" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="metal-form-label">Data de Fim <span class="text-danger">*</span></label>
            <input type="date" name="data_fim" class="metal-form-control" 
                   value="{{ form.data_fim.value|default:''|date:'Y-m-d' }}" required>
        </div>
    </div>
    
    <div class="mb-3">
        <label class="metal-form-label">Descrição</label>
        <textarea name="descricao" class="metal-form-control" rows="3">{{ form.descricao.value|default:'' }}</textarea>
    </div>
    
    <div class="mb-3">
        <label class="metal-form-label">Ativo</label>
        <select name="ativo" class="metal-form-select">
            <option value="1" {% if form.ativo.value %}selected{% endif %}>Sim</option>
            <option value="0" {% if not form.ativo.value and form.ativo.value is not None %}selected{% endif %}>Não</option>
        </select>
    </div>
</form>
