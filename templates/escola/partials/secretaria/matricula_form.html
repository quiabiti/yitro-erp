{% load static %}

<style>
    /* 🔥 ESTILOS SIMPLES - IGUAL AO FORMULÁRIO DE USUÁRIOS */
    .metal-form-label {
        color: rgba(255, 255, 255, 0.8) !important;
        font-size: clamp(0.7rem, 2vw, 0.8rem) !important;
        font-weight: 500 !important;
        margin-bottom: 4px !important;
        display: block !important;
    }
    
    .metal-form-control,
    .metal-form-select {
        width: 100% !important;
        padding: clamp(8px, 1.5vw, 12px) clamp(10px, 2vw, 14px) !important;
        background: rgba(255, 255, 255, 0.08) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 8px !important;
        color: #ffffff !important;
        font-size: clamp(0.8rem, 2vw, 0.9rem) !important;
        transition: all 0.3s ease !important;
        -webkit-appearance: none !important;
        appearance: none !important;
    }
    
    .metal-form-control:focus,
    .metal-form-select:focus {
        border-color: #00d4ff !important;
        box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.15) !important;
        outline: none !important;
        background: rgba(255, 255, 255, 0.12) !important;
    }
    
    .metal-form-control::placeholder,
    .metal-form-select::placeholder {
        color: rgba(255, 255, 255, 0.4) !important;
        font-size: clamp(0.7rem, 1.8vw, 0.8rem) !important;
    }
    
    .metal-form-select option {
        background: #1a1a2e !important;
        color: #ffffff !important;
        padding: 8px !important;
    }
    
    .metal-form-control-readonly {
        width: 100% !important;
        padding: clamp(8px, 1.5vw, 12px) clamp(10px, 2vw, 14px) !important;
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 8px !important;
        color: #ffffff !important;
        font-size: clamp(0.8rem, 2vw, 0.9rem) !important;
        min-height: clamp(40px, 6vw, 48px) !important;
        display: flex !important;
        align-items: center !important;
        flex-wrap: wrap !important;
        cursor: default !important;
    }
    
    .metal-btn-primary {
        background: rgba(255, 255, 255, 0.15) !important;
        border: 1px solid rgba(255, 255, 255, 0.3) !important;
        color: white !important;
        border-radius: 8px !important;
        font-weight: 500 !important;
        transition: all 0.2s ease !important;
        cursor: pointer !important;
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        gap: 4px !important;
        white-space: nowrap !important;
        touch-action: manipulation !important;
        min-height: 34px !important;
        padding: 4px 14px !important;
        font-size: clamp(0.6rem, 1.8vw, 0.75rem) !important;
    }
    .metal-btn-primary:hover {
        background: rgba(255, 255, 255, 0.25) !important;
    }
    .metal-btn-primary:active {
        transform: scale(0.96) !important;
    }
    
    .metal-btn-secondary {
        background: rgba(0, 0, 0, 0.2) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: rgba(255, 255, 255, 0.8) !important;
        border-radius: 8px !important;
        font-weight: 500 !important;
        transition: all 0.2s ease !important;
        cursor: pointer !important;
        touch-action: manipulation !important;
        min-height: 34px !important;
        padding: 4px 14px !important;
        font-size: clamp(0.6rem, 1.8vw, 0.75rem) !important;
    }
    .metal-btn-secondary:hover {
        background: rgba(0, 0, 0, 0.3) !important;
    }
    .metal-btn-secondary:active {
        transform: scale(0.96) !important;
    }
    
    .form-check.form-switch {
        padding-left: 2.5em !important;
        margin-bottom: 4px !important;
    }
    
    .form-check-input {
        width: clamp(36px, 6vw, 44px) !important;
        height: clamp(18px, 3vw, 22px) !important;
        margin-top: 0 !important;
        cursor: pointer !important;
        background-color: rgba(255, 255, 255, 0.15) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='-4 -4 8 8'%3e%3ccircle r='3' fill='rgba(255,255,255,0.3)'/%3e%3c/svg%3e") !important;
        transition: all 0.3s ease !important;
        flex-shrink: 0 !important;
    }
    
    .form-check-input:checked {
        background-color: #00d4ff !important;
        border-color: #00d4ff !important;
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='-4 -4 8 8'%3e%3ccircle r='3' fill='%23fff'/%3e%3c/svg%3e") !important;
    }
    
    .form-check-input:focus {
        border-color: #00d4ff !important;
        box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.15) !important;
    }
    
    .form-check-label {
        color: rgba(255, 255, 255, 0.8) !important;
        font-size: clamp(0.75rem, 2vw, 0.85rem) !important;
        cursor: pointer !important;
        user-select: none !important;
        padding-left: 4px !important;
    }
    
    /* Validação */
    .invalid-feedback-metal {
        display: none !important;
        font-size: clamp(0.6rem, 1.5vw, 0.7rem) !important;
        color: #ff4757 !important;
        margin-top: 4px !important;
    }
    .invalid-feedback-metal.show {
        display: block !important;
    }
    .is-invalid {
        border-color: #ff4757 !important;
    }
    
    /* Resultado da busca */
    #resultadoBusca {
        color: #ffffff !important;
    }
    #resultadoBusca * {
        color: #ffffff !important;
    }
    #resultadoBusca .list-group-item {
        background: rgba(255, 255, 255, 0.08) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: #ffffff !important;
        cursor: pointer !important;
        transition: all 0.2s ease !important;
        padding: 10px 14px !important;
        margin-bottom: 4px !important;
        border-radius: 8px !important;
    }
    #resultadoBusca .list-group-item:hover {
        background: rgba(255, 255, 255, 0.18) !important;
    }
    #resultadoBusca .list-group-item strong {
        color: #ffffff !important;
    }
    #resultadoBusca .alert {
        color: #ffffff !important;
    }
    
    /* Responsivo */
    @media (max-width: 576px) {
        .metal-form-control,
        .metal-form-select {
            padding: 8px 10px !important;
            font-size: 0.8rem !important;
            min-height: 40px !important;
        }
        .metal-form-label {
            font-size: 0.7rem !important;
        }
        .form-check.form-switch {
            padding-left: 2.2em !important;
        }
        .form-check-input {
            width: 32px !important;
            height: 16px !important;
        }
        .form-check-label {
            font-size: 0.7rem !important;
        }
        .metal-btn-primary,
        .metal-btn-secondary {
            font-size: 0.65rem !important;
            padding: 4px 10px !important;
            min-height: 30px !important;
        }
    }
    
    @media (max-width: 380px) {
        .metal-form-control,
        .metal-form-select {
            padding: 6px 8px !important;
            font-size: 0.7rem !important;
            min-height: 34px !important;
        }
        .metal-form-label {
            font-size: 0.6rem !important;
        }
        .form-check.form-switch {
            padding-left: 1.8em !important;
        }
        .form-check-input {
            width: 28px !important;
            height: 14px !important;
        }
        .form-check-label {
            font-size: 0.6rem !important;
        }
    }
    
    @supports (-webkit-touch-callout: none) {
        .metal-form-control,
        .metal-form-select {
            font-size: 16px !important;
        }
    }
</style>

<form id="formMatricula" method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <input type="hidden" name="aluno_id" id="aluno_id" value="{{ aluno.id|default:'' }}">
    {% if edit %}
        <input type="hidden" name="matricula_id" value="{{ matricula.id }}">
    {% endif %}
    
    <!-- BUSCAR ALUNO -->
    <div class="row">
        <div class="col-12 mb-3">
            <label class="metal-form-label">Buscar Aluno</label>
            <div class="d-flex gap-2">
                <input type="text" id="buscarAluno" class="metal-form-control" placeholder="Digite o BI ou Nome do aluno...">
                <button type="button" class="metal-btn-primary" onclick="window.buscarAluno()">
                    <i class="bi bi-search"></i> Buscar
                </button>
                <button type="button" class="metal-btn-secondary" onclick="window.limparBusca()">
                    <i class="bi bi-x"></i>
                </button>
            </div>
            <div id="resultadoBusca" class="mt-2" style="display: none;"></div>
        </div>
    </div>

    <!-- TIPO DE MATRÍCULA -->
    <div class="row">
        <div class="col-12 mb-3">
            <label class="metal-form-label">Tipo de Matrícula</label>
            <div class="d-flex gap-3 flex-wrap">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="tipo" id="tipoNova" value="nova" 
                           {% if not edit or matricula.tipo == 'nova' %}checked{% endif %}
                           onchange="window.atualizarCampos()">
                    <label class="form-check-label" for="tipoNova">Nova Matrícula</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="tipo" id="tipoRenovacao" value="renovacao"
                           {% if matricula.tipo == 'renovacao' %}checked{% endif %}
                           onchange="window.atualizarCampos()">
                    <label class="form-check-label" for="tipoRenovacao">Renovação</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="tipo" id="tipoTransferencia" value="transferencia"
                           {% if matricula.tipo == 'transferencia' %}checked{% endif %}
                           onchange="window.atualizarCampos()">
                    <label class="form-check-label" for="tipoTransferencia">Transferência</label>
                </div>
            </div>
        </div>
    </div>

    <!-- DADOS DO ALUNO -->
    <div class="row">
        <div class="col-12 mb-2">
            <h6 style="font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 6px; color: #00d4ff !important;">
                <i class="bi bi-person me-2"></i>Dados do Aluno (conforme BI)
            </h6>
        </div>
    </div>
    
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="metal-form-label">Nome Completo <span class="text-danger">*</span></label>
            <input type="text" name="nome_completo" id="nome_completo" 
                   class="metal-form-control" 
                   placeholder="Ex: João Manuel Silva"
                   value="{{ aluno.nome_completo|default:'' }}" required>
        </div>
        <div class="col-md-3 mb-3">
            <label class="metal-form-label">Data Nascimento <span class="text-danger">*</span></label>
            <input type="date" name="data_nascimento" id="data_nascimento" 
                   class="metal-form-control" 
                   value="{{ aluno.data_nascimento|date:'Y-m-d'|default:'' }}" required>
        </div>
        <div class="col-md-3 mb-3">
            <label class="metal-form-label">Gênero <span class="text-danger">*</span></label>
            <select name="genero" id="genero" class="metal-form-control" required>
                <option value="M" {% if aluno.genero == 'M' %}selected{% endif %}>Masculino</option>
                <option value="F" {% if aluno.genero == 'F' %}selected{% endif %}>Feminino</option>
            </select>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4 mb-3">
            <label class="metal-form-label">BI <span class="text-danger">*</span></label>
            <input type="text" name="bi" id="bi" 
                   class="metal-form-control" 
                   placeholder="Ex: 001-123456-AA"
                   value="{{ aluno.bi|default:'' }}" required>
        </div>
        <div class="col-md-4 mb-3">
            <label class="metal-form-label">NIF</label>
            <input type="text" name="nif" id="nif" 
                   class="metal-form-control" 
                   placeholder="Ex: 5001234567"
                   value="{{ aluno.nif|default:'' }}">
        </div>
        <div class="col-md-4 mb-3">
            <label class="metal-form-label">Naturalidade</label>
            <input type="text" name="naturalidade" id="naturalidade" 
                   class="metal-form-control" 
                   placeholder="Ex: Luanda"
                   value="{{ aluno.naturalidade|default:'' }}">
        </div>
    </div>

    <div class="row">
        <div class="col-md-4 mb-3">
            <label class="metal-form-label">Nacionalidade</label>
            <input type="text" name="nacionalidade" id="nacionalidade" 
                   class="metal-form-control" 
                   value="{{ aluno.nacionalidade|default:'Angola' }}">
        </div>
        <div class="col-md-4 mb-3">
            <label class="metal-form-label">Telefone <span class="text-danger">*</span></label>
            <input type="text" name="telefone" id="telefone" 
                   class="metal-form-control" 
                   placeholder="Ex: 923456789"
                   value="{{ aluno.telefone|default:'' }}" required>
        </div>
        <div class="col-md-4 mb-3">
            <label class="metal-form-label">E-mail</label>
            <input type="email" name="email" id="email" 
                   class="metal-form-control" 
                   placeholder="Ex: aluno@email.com"
                   value="{{ aluno.email|default:'' }}">
        </div>
    </div>

    <div class="row">
        <div class="col-12 mb-3">
            <label class="metal-form-label">Endereço</label>
            <textarea name="endereco" id="endereco" 
                      class="metal-form-control" 
                      rows="2"
                      placeholder="Ex: Rua X, Bairro Y, Luanda">{{ aluno.endereco|default:'' }}</textarea>
        </div>
    </div>

    <!-- RESPONSÁVEIS -->
    <div class="row">
        <div class="col-12 mb-2">
            <h6 style="font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 6px; color: #00d4ff !important;">
                <i class="bi bi-people me-2"></i>Responsáveis (Filiação)
            </h6>
        </div>
    </div>
    
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="metal-form-label">Nome do Pai</label>
            <input type="text" name="nome_pai" id="nome_pai" 
                   class="metal-form-control" 
                   placeholder="Ex: José Silva"
                   value="{{ aluno.nome_pai|default:'' }}">
        </div>
        <div class="col-md-6 mb-3">
            <label class="metal-form-label">Nome da Mãe</label>
            <input type="text" name="nome_mae" id="nome_mae" 
                   class="metal-form-control" 
                   placeholder="Ex: Maria Silva"
                   value="{{ aluno.nome_mae|default:'' }}">
        </div>
    </div>

    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="metal-form-label">Telefone do Responsável <span class="text-danger">*</span></label>
            <input type="text" name="telefone_responsavel" id="telefone_responsavel" 
                   class="metal-form-control" 
                   placeholder="Ex: 934567890"
                   value="{{ aluno.telefone_responsavel|default:'' }}" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="metal-form-label">E-mail do Responsável</label>
            <input type="email" name="email_responsavel" id="email_responsavel" 
                   class="metal-form-control" 
                   placeholder="Ex: responsavel@email.com"
                   value="{{ aluno.email_responsavel|default:'' }}">
        </div>
    </div>

    <!-- DADOS DA MATRÍCULA -->
    <div class="row">
        <div class="col-12 mb-2">
            <h6 style="font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 6px; color: #00d4ff !important;">
                <i class="bi bi-book me-2"></i>Dados da Matrícula
            </h6>
        </div>
    </div>
    
    <div class="row">
        <div class="col-md-3 mb-3">
            <label class="metal-form-label">Ano Lectivo <span class="text-danger">*</span></label>
            <select name="ano_lectivo" id="ano_lectivo" class="metal-form-control" required>
                <option value="">Selecione...</option>
                {% for ano in ano_lectivos %}
                    <option value="{{ ano.id }}" {% if matricula.ano_lectivo.id == ano.id %}selected{% endif %}>
                        {{ ano.ano }}
                    </option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-3 mb-3">
            <label class="metal-form-label">Classe <span class="text-danger">*</span></label>
            <select name="classe" id="classe" class="metal-form-control" required>
                <option value="">Selecione...</option>
                {% for classe in classes %}
                    <option value="{{ classe.id }}" {% if matricula.classe.id == classe.id or proxima_classe_sugerida.id == classe.id %}selected{% endif %}>
                        {{ classe.nome }}
                    </option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-3 mb-3">
            <label class="metal-form-label">Turma</label>
            <select name="turma" id="turma" class="metal-form-control">
                <option value="">Selecione...</option>
                {% for turma in turmas %}
                    <option value="{{ turma.id }}" {% if matricula.turma.id == turma.id %}selected{% endif %}>
                        {{ turma.nome }}
                    </option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-3 mb-3">
            <label class="metal-form-label">Status</label>
            <select name="status" id="status" class="metal-form-control">
                <option value="pendente" {% if matricula.status == 'pendente' or not matricula %}selected{% endif %}>Pendente</option>
                <option value="confirmada" {% if matricula.status == 'confirmada' %}selected{% endif %}>Confirmada</option>
                <option value="trancada" {% if matricula.status == 'trancada' %}selected{% endif %}>Trancada</option>
                <option value="cancelada" {% if matricula.status == 'cancelada' %}selected{% endif %}>Cancelada</option>
                <option value="concluida" {% if matricula.status == 'concluida' %}selected{% endif %}>Concluída</option>
            </select>
        </div>
    </div>

    <div class="row">
        <div class="col-12 mb-3">
            <label class="metal-form-label">Observações</label>
            <textarea name="observacoes" id="observacoes" 
                      class="metal-form-control" 
                      rows="2"
                      placeholder="Observações sobre a matrícula...">{{ matricula.observacoes|default:'' }}</textarea>
        </div>
    </div>
</form>
