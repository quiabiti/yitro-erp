{% load static %}
{% load humanize %}

<!-- TOKEN CSRF OCULTO -->
{% csrf_token %}

<!-- CABEÇALHO -->
<div class="metal-header mb-3 fade-in-up">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
        <div>
            <h1 class="metal-title" style="font-size: clamp(1rem, 4vw, 1.2rem);">
                <i class="bi bi-people me-2"></i> Lista de Alunos por Turma
            </h1>
            <p class="metal-subtitle" style="font-size: clamp(0.6rem, 2vw, 0.75rem);">Visualize todos os alunos organizados por turma</p>
        </div>
        <div>
            <span class="badge bg-primary" style="font-size: clamp(0.55rem, 1.5vw, 0.7rem); padding: 4px 10px; white-space: nowrap;">
                <i class="bi bi-people me-1"></i> Total: {{ total_alunos|default:0 }}
            </span>
        </div>
    </div>
</div>

<!-- FILTROS -->
<div class="glass-card p-2 p-sm-3 mb-3 fade-in-up delay-1">
    <div class="row g-1 g-sm-2 align-items-center">
        <div class="col-12 col-sm-6 col-md-4">
            <div class="d-flex gap-1 gap-sm-2">
                <input type="text" id="buscarAluno" class="metal-form-control" placeholder="Buscar aluno..." style="font-size: clamp(0.7rem, 2vw, 0.8rem); padding: 6px 8px; min-height: 32px;">
                <button class="metal-btn-primary" onclick="carregarAlunos()" style="font-size: clamp(0.6rem, 1.5vw, 0.7rem); padding: 4px 10px; min-height: 32px;">
                    <i class="bi bi-search"></i>
                </button>
            </div>
        </div>
        <div class="col-6 col-sm-3 col-md-3">
            <select id="filtroClasse" class="metal-form-control" style="font-size: clamp(0.65rem, 1.8vw, 0.8rem); padding: 4px 8px; min-height: 32px;" onchange="carregarAlunos()">
                <option value="">Todas as Classes</option>
                {% for classe in classes %}
                    <option value="{{ classe.id }}">{{ classe.nome }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-6 col-sm-3 col-md-3">
            <select id="filtroTurma" class="metal-form-control" style="font-size: clamp(0.65rem, 1.8vw, 0.8rem); padding: 4px 8px; min-height: 32px;" onchange="carregarAlunos()">
                <option value="">Todas as Turmas</option>
                {% for turma in turmas %}
                    <option value="{{ turma.id }}">{{ turma.nome }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-12 col-sm-12 col-md-2 text-end">
            <button class="metal-btn-secondary" onclick="limparFiltros()" style="font-size: clamp(0.6rem, 1.5vw, 0.7rem); padding: 4px 10px; min-height: 32px; width: 100%;">
                <i class="bi bi-arrow-counterclockwise me-1"></i> Limpar
            </button>
        </div>
    </div>
</div>

<!-- LISTA DE ALUNOS -->
<section class="fade-in-up delay-2">
    <div class="glass-card" style="padding: 0.6rem 0.8rem;">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h6 class="text-white mb-0" style="font-size: clamp(0.75rem, 2.5vw, 0.85rem);">
                <i class="bi bi-list-ul me-2 text-primary"></i> Alunos
                <span class="badge bg-primary ms-1" id="count-alunos" style="font-size: clamp(0.5rem, 1.2vw, 0.6rem); color: #ffffff !important;">0</span>
            </h6>
        </div>
        <div id="lista-alunos" class="lista-items" style="max-height: 500px; -webkit-overflow-scrolling: touch;">
            <div class="text-center py-3 text-muted" style="font-size: clamp(0.6rem, 1.8vw, 0.7rem); color: rgba(255,255,255,0.5) !important;">
                <i class="bi bi-hourglass-split me-1"></i> Carregando...
            </div>
        </div>
    </div>
</section>

<!-- ESTILOS -->
<style>
    .metal-header { 
        background: linear-gradient(135deg, #00d4ff, #7b2ffc); 
        border-radius: 12px; 
        padding: clamp(0.5rem, 2vw, 1rem) clamp(0.8rem, 3vw, 1.2rem); 
        border: 1px solid rgba(255,255,255,0.1); 
    }
    .metal-title { color: white; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
    .metal-subtitle { color: rgba(255,255,255,0.9) !important; }
    
    .metal-btn-primary { 
        background: rgba(255,255,255,0.15); 
        border: 1px solid rgba(255,255,255,0.3); 
        color: white; 
        border-radius: 8px; 
        font-weight: 500; 
        transition: all 0.2s ease; 
        cursor: pointer; 
        display: inline-flex; 
        align-items: center; 
        justify-content: center;
        gap: 4px; 
        white-space: nowrap; 
        touch-action: manipulation;
        min-height: 32px;
        padding: 4px 12px;
    }
    .metal-btn-primary:hover { background: rgba(255,255,255,0.25); color: white; }
    
    .metal-btn-secondary { 
        background: rgba(108,117,125,0.2); 
        border: 1px solid rgba(108,117,125,0.3); 
        color: #6c757d; 
        border-radius: 8px; 
        font-weight: 500; 
        transition: all 0.2s ease; 
        cursor: pointer;
        touch-action: manipulation;
        min-height: 32px;
        padding: 4px 12px;
    }
    .metal-btn-secondary:hover { background: rgba(108,117,125,0.3); color: #5a6268; }
    
    .metal-form-control { 
        background: rgba(255,255,255,0.05) !important; 
        border: 1px solid rgba(255,255,255,0.1) !important; 
        border-radius: 8px; 
        padding: 6px 10px; 
        color: #ffffff !important; 
        font-size: clamp(0.7rem, 2vw, 0.85rem); 
        width: 100%; 
        min-height: 32px;
        -webkit-appearance: none;
        appearance: none;
    }
    .metal-form-control:focus { 
        border-color: #00d4ff !important; 
        box-shadow: 0 0 0 2px rgba(0,212,255,0.15) !important; 
        outline: none; 
        background: rgba(255,255,255,0.08) !important; 
        color: #ffffff !important; 
    }
    .metal-form-control::placeholder { color: rgba(255,255,255,0.3) !important; }
    .metal-form-control option { background-color: #1a1a2e !important; color: #ffffff !important; }
    
    .glass-card { 
        background: rgba(255,255,255,0.03); 
        backdrop-filter: blur(10px); 
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.05); 
        border-radius: 12px; 
        transition: all 0.2s ease; 
        color: #ffffff !important; 
    }
    
    .badge { 
        padding: 2px 8px; 
        border-radius: 12px; 
        font-weight: 600; 
        text-transform: uppercase; 
        letter-spacing: 0.3px; 
        color: #ffffff !important; 
    }
    .bg-success { background-color: #2ed573 !important; }
    .bg-warning { background-color: #ffa502 !important; color: #212529 !important; }
    .bg-danger { background-color: #ff4757 !important; }
    .bg-primary { background-color: #00d4ff !important; }
    .bg-info { background-color: #7b2ffc !important; }
    .bg-secondary { background-color: #6c757d !important; }
    .bg-dark { background-color: #343a40 !important; }
    
    .fade-in-up { animation: fadeInUp 0.4s ease forwards; opacity: 0; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    .delay-1 { animation-delay: 0.05s; }
    .delay-2 { animation-delay: 0.1s; }
    
    .text-muted { color: rgba(255,255,255,0.5) !important; }
    
    .lista-items { 
        max-height: 500px; 
        overflow-y: auto; 
        -webkit-overflow-scrolling: touch;
    }
    .lista-items::-webkit-scrollbar { width: 3px; }
    .lista-items::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 3px; }
    .lista-items::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.2); border-radius: 3px; }
    
    .item-aluno { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        padding: 8px 12px; 
        border-bottom: 1px solid rgba(255,255,255,0.03); 
        border-radius: 4px; 
        gap: 8px; 
        flex-wrap: wrap; 
        touch-action: manipulation;
    }
    .item-aluno:hover { background: rgba(255,255,255,0.02); }
    .item-aluno .aluno-info { 
        display: flex; 
        align-items: center; 
        gap: 8px; 
        flex: 1; 
        min-width: 0; 
        flex-wrap: wrap; 
    }
    .item-aluno .aluno-info .aluno-nome { 
        font-weight: 500; 
        color: #ffffff; 
        font-size: clamp(0.7rem, 2vw, 0.82rem); 
        white-space: nowrap; 
        overflow: hidden; 
        text-overflow: ellipsis; 
        max-width: 150px; 
    }
    .item-aluno .aluno-info .aluno-bi { 
        font-size: clamp(0.5rem, 1.2vw, 0.6rem); 
        color: rgba(255,255,255,0.5); 
    }
    .item-aluno .aluno-info .aluno-detalhes { 
        display: flex; 
        gap: 4px; 
        flex-wrap: wrap; 
        align-items: center; 
    }
    .item-aluno .aluno-info .aluno-detalhes .badge { 
        font-size: clamp(0.4rem, 1vw, 0.5rem); 
        padding: 1px 6px; 
    }
    
    @media (max-width: 480px) {
        .item-aluno .aluno-info .aluno-nome { max-width: 80px; font-size: 0.7rem; }
        .item-aluno .aluno-info .aluno-detalhes .badge { font-size: 0.4rem; padding: 0px 4px; }
        .metal-title { font-size: 1rem; }
        .metal-header { padding: 0.5rem 0.6rem; }
        .lista-items { max-height: 300px; }
    }
</style>

<!-- SCRIPTS -->
<script>
// ============================================
// VARIÁVEIS
// ============================================
const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]')?.value || '';

// ============================================
// CARREGAR ALUNOS
// ============================================
function carregarAlunos() {
    const busca = document.getElementById('buscarAluno')?.value || '';
    const classe = document.getElementById('filtroClasse')?.value || '';
    const turma = document.getElementById('filtroTurma')?.value || '';
    
    const container = document.getElementById('lista-alunos');
    const badge = document.getElementById('count-alunos');
    
    container.innerHTML = '<div class="text-center py-2 text-muted" style="font-size:0.65rem;"><i class="bi bi-hourglass-split me-1"></i>Carregando...</div>';
    
    let url = `/escola/api/secretaria/alunos/listar/?busca=${encodeURIComponent(busca)}`;
    if (classe) url += `&classe=${classe}`;
    if (turma) url += `&turma=${turma}`;
    
    fetch(url, {
        method: 'GET',
        headers: { 'X-Requested-With': 'XMLHttpRequest' },
        credentials: 'include'
    })
    .then(r => r.json())
    .then(d => {
        if (d.success) {
            const items = d.data || [];
            if (badge) badge.textContent = items.length;
            
            if (!items.length) {
                container.innerHTML = '<div class="text-center py-2 text-muted" style="font-size:0.65rem;"><i class="bi bi-inbox me-1"></i>Nenhum aluno encontrado</div>';
                return;
            }
            
            let html = '';
            items.forEach(item => {
                const statusMatricula = item.status_matricula || 'sem_matricula';
                const statusLabel = item.status_matricula_display || 'Sem Matrícula';
                const classeNome = item.classe || 'N/A';
                const turmaNome = item.turma || 'N/A';
                const anoLectivo = item.ano_lectivo || 'N/A';
                
                html += `
                    <div class="item-aluno">
                        <div class="aluno-info">
                            <span class="aluno-nome">${item.nome_completo || 'N/A'}</span>
                            <span class="aluno-bi">BI: ${item.bi || ''}</span>
                            <div class="aluno-detalhes">
                                <span class="badge bg-primary">${classeNome}</span>
                                ${turmaNome !== 'N/A' ? `<span class="badge bg-info">${turmaNome}</span>` : ''}
                                <span class="badge bg-secondary">${anoLectivo}</span>
                                ${statusMatricula !== 'sem_matricula' ? `<span class="badge ${statusMatricula === 'confirmada' ? 'bg-success' : statusMatricula === 'pendente' ? 'bg-warning' : 'bg-secondary'}">${statusLabel}</span>` : ''}
                            </div>
                        </div>
                        <div>
                            <span class="badge bg-dark" style="font-size:0.5rem;">ID: ${item.id}</span>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        } else {
            container.innerHTML = `<div class="text-center py-2 text-muted" style="font-size:0.65rem;">${d.error || 'Erro ao carregar'}</div>`;
        }
    })
    .catch(e => {
        console.error('❌ Erro:', e);
        container.innerHTML = '<div class="text-center py-2 text-muted" style="font-size:0.65rem;">Erro ao carregar dados</div>';
    });
}

// ============================================
// FILTROS
// ============================================
function limparFiltros() {
    document.getElementById('buscarAluno').value = '';
    document.getElementById('filtroClasse').value = '';
    document.getElementById('filtroTurma').value = '';
    carregarAlunos();
}

// ============================================
// INICIALIZAR
// ============================================
document.addEventListener('DOMContentLoaded', function() {
    console.log('🚀 Lista de Alunos - Inicializando...');
    carregarAlunos();
    
    // Buscar com Enter
    document.getElementById('buscarAluno')?.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            carregarAlunos();
        }
    });
    
    console.log('✅ Lista de Alunos inicializada!');
});
</script>
