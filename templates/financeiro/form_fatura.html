{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="glass-card">
            <h2 class="mb-4">Emitir Nova Fatura</h2>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Cliente</label>
                    {{ form.cliente }}
                </div>
                <div class="alert alert-info bg-transparent border-info text-info small">
                    A numeração e a assinatura digital (Hash AGT) serão geradas automaticamente após a submissão, garantindo a integridade dos dados.
                </div>
                <div class="d-flex justify-content-between">
                    <a href="{% url 'financeiro:lista_faturas' %}" class="btn btn-outline-light">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Gerar Fatura Certificada</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
