{% load static %}
<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Yitro ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0e1a;
            overflow: hidden;
        }
        .login-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .login-background video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }
        .login-background .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(10, 14, 26, 0.85), rgba(10, 14, 26, 0.95));
        }
        .login-background .grid-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 20px;
            padding: 40px 35px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
            animation: fadeInUp 0.6s ease forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-logo { text-align: center; margin-bottom: 30px; }
        .login-logo .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 24px;
            color: #fff;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
            margin-bottom: 12px;
        }
        .login-logo h1 {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 24px;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            letter-spacing: 2px;
        }
        .login-logo p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 4px 0 0;
        }
        .messages { margin-bottom: 20px; }
        .messages .alert {
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 13px;
            border: none;
            margin-bottom: 8px;
        }
        .alert-success { background: rgba(40, 167, 69, 0.15); color: #2ed573; border-left: 3px solid #2ed573; }
        .alert-danger { background: rgba(220, 53, 69, 0.15); color: #ff4757; border-left: 3px solid #ff4757; }
        .alert-info { background: rgba(23, 162, 184, 0.15); color: #00d4ff; border-left: 3px solid #00d4ff; }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 5px;
        }
        .form-group .input-group { position: relative; }
        .form-group .input-group .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.3);
            z-index: 10;
        }
        .form-control {
            width: 100%;
            padding: 11px 14px 11px 42px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #fff;
            font-size: 13px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            outline: none;
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 0 4px rgba(0, 212, 255, 0.05);
            background: rgba(255, 255, 255, 0.08);
        }
        .form-control::placeholder { color: rgba(255, 255, 255, 0.25); }
        .form-control.password-input { padding-right: 42px; }
        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            z-index: 10;
        }
        .toggle-password:hover { color: rgba(255, 255, 255, 0.6); }
        .btn-login {
            width: 100%;
            padding: 11px;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.15);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.25);
        }
        .register-link {
            text-align: center;
            margin-top: 18px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
        }
        .register-link a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }
        .register-link a:hover { color: #7b2ffc; }
        @media (max-width: 480px) {
            .login-card { padding: 25px 18px; }
            .login-logo h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="login-background">
        <video autoplay muted loop playsinline>
            <source src="{% static 'videos/fundo-tecnologia.mp4' %}" type="video/mp4">
            <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-technology-connection-lines-network-loop-28564-large.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
        <div class="grid-lines"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-icon">Y</div>
                <h1>YITRO</h1>
                <p>Criar conta</p>
            </div>

            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% elif message.tags == 'success' %}success{% else %}info{% endif %}">
                    <i class="bi bi-{% if message.tags == 'error' %}exclamation-circle{% elif message.tags == 'success' %}check-circle{% else %}info-circle{% endif %} me-2"></i>
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                
                <div class="form-group">
                    <label>Nome de Usuário</label>
                    <div class="input-group">
                        <span class="input-icon"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="Crie um nome de usuário" value="{{ username|default:'' }}" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <div class="input-group">
                        <span class="input-icon"><i class="bi bi-envelope"></i></span>
                        <input type="email" name="email" class="form-control" placeholder="Digite seu email" value="{{ email|default:'' }}" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <div class="input-group">
                        <span class="input-icon"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" id="password" class="form-control password-input" placeholder="Mínimo 8 caracteres" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="bi bi-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirmar Senha</label>
                    <div class="input-group">
                        <span class="input-icon"><i class="bi bi-shield-lock"></i></span>
                        <input type="password" name="password_confirm" class="form-control password-input" placeholder="Confirme sua senha" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="bi bi-person-plus me-2"></i> Criar Conta
                </button>

                <div class="register-link">
                    Já tem uma conta? <a href="{% url 'autenticacao:login' %}">Fazer Login</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.className = 'bi bi-eye-slash';
            } else {
                passwordInput.type = 'password';
                toggleIcon.className = 'bi bi-eye';
            }
        }
    </script>
</body>
</html>
